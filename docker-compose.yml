version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: receivables_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: receivables
    networks:
      - receivables-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d receivables"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: receivables_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - receivables-network

  frontend:
    build: ./frontend
    container_name: receivables_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:4000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - receivables-network

  adminer:
    image: adminer
    container_name: receivables_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - receivables-network

volumes:
  postgres_data:

networks:
  receivables-network:
    driver: bridge
